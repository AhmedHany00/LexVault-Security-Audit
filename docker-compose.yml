version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: security_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB:       secure_legal_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: security_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT:             3000
      NODE_ENV:         production
      DB_TYPE:          postgres
      DB_HOST:          db
      DB_PORT:          5432
      DB_USER:          postgres
      DB_PASSWORD:      admin
      DB_NAME:          secure_legal_db
      JWT_SECRET:       super_secret_jwt_key_for_legal_app
      FRONTEND_URL:     http://localhost:5173
      RATE_LIMIT_LOGIN_MAX:    10
      RATE_LIMIT_REGISTER_MAX: 5
      RATE_LIMIT_WINDOW_MS:    60000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: security_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  pgdata:
  uploads:
  logs:
